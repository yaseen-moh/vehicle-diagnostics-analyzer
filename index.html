<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vehicle Diagnostics Analyzer — Live Demo</title>
<style>
  body { margin:0; background:#0d1117; color:#e6e6f0; font-family: 'Segoe UI', system-ui, sans-serif; }
  #wrap { max-width: 920px; margin:0 auto; padding:20px; }
  h1 { font-size:1.3rem; margin-bottom:4px; }
  p.sub { color:#9090a8; margin-top:0; font-size:0.9rem; }
  .grid { display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-top:16px; }
  canvas { background:#111726; border-radius:8px; display:block; }
  table { width:100%; border-collapse:collapse; font-size:0.82rem; }
  th, td { text-align:left; padding:6px 8px; border-bottom:1px solid #232a3a; }
  th { color:#9090a8; font-weight:500; }
  tr.risk-row { cursor:pointer; }
  tr.risk-row:hover { background:#1a2233; }
  tr.selected { background:#213248; }
  .badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:0.72rem; font-weight:600; }
  .badge.high { background:#4a1620; color:#ff9494; }
  .badge.med { background:#4a3a16; color:#ffd494; }
  .badge.low { background:#12321f; color:#7fffb0; }
  #history h3 { font-size:0.95rem; margin-bottom:6px; color:#c8c8e0; }
  #history table { margin-top:6px; }
  .note { font-size:0.78rem; color:#6a6a88; margin-top:14px; }
</style>
</head>
<body>
<div id="wrap">
  <h1>Vehicle Repair & Cascading-Failure Analyzer</h1>
  <p class="sub">Click any vehicle in the risk table to drill into its full repair timeline.</p>

  <div class="grid">
    <div>
      <canvas id="costChart" width="430" height="260"></canvas>
    </div>
    <div>
      <table id="riskTable">
        <thead><tr><th>Vehicle</th><th>Systems</th><th>Risk</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <div id="history"></div>
  <p class="note">Data is synthetic (see generate_sample_data.py) — no real shop or customer data.</p>
</div>

<script>
fetch('demo_data.json').then(r=>r.json()).then(data=>{
  drawCostChart(data.costs);
  buildRiskTable(data.risk, data.histories);
});

function drawCostChart(costs){
  const canvas = document.getElementById('costChart');
  const ctx = canvas.getContext('2d');
  const W=canvas.width, H=canvas.height, pad=90;
  ctx.fillStyle='#111726'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#c8c8e0'; ctx.font='13px sans-serif';
  ctx.fillText('Total repair cost by system', 12, 18);

  const maxCost = Math.max(...costs.map(c=>c.total_cost));
  const barH = (H-40)/costs.length;
  costs.forEach((c,i)=>{
    const y = 30 + i*barH;
    const w = (c.total_cost/maxCost) * (W-pad-20);
    ctx.fillStyle = '#5aa9ff';
    ctx.fillRect(pad, y, w, barH*0.6);
    ctx.fillStyle='#c8c8e0'; ctx.font='11px sans-serif'; ctx.textAlign='right';
    ctx.fillText(c.system, pad-6, y+barH*0.4);
    ctx.textAlign='left';
    ctx.fillText('$'+c.total_cost.toLocaleString(), pad+w+6, y+barH*0.4);
  });
}

function riskBadge(score){
  if(score>=70) return '<span class="badge high">HIGH</span>';
  if(score>=40) return '<span class="badge med">MED</span>';
  return '<span class="badge low">LOW</span>';
}

function buildRiskTable(risk, histories){
  const tbody = document.querySelector('#riskTable tbody');
  risk.forEach(r=>{
    const tr = document.createElement('tr');
    tr.className = 'risk-row';
    tr.innerHTML = `<td>${r.vehicle_id}</td><td>${r.distinct_systems_affected}</td><td>${riskBadge(r.risk_score)} ${r.risk_score}</td>`;
    tr.addEventListener('click', ()=>{
      document.querySelectorAll('.risk-row').forEach(row=>row.classList.remove('selected'));
      tr.classList.add('selected');
      showHistory(r.vehicle_id, r.systems, histories[r.vehicle_id]);
    });
    tbody.appendChild(tr);
  });
  // auto-select the top risk vehicle
  if(risk.length){
    tbody.firstChild.click();
  }
}

function showHistory(vehicleId, systems, rows){
  const el = document.getElementById('history');
  if(!rows){
    el.innerHTML = `<h3>${vehicleId}</h3><p style="color:#8888a8;font-size:0.85rem;">No detailed history loaded for this vehicle in the demo dataset.</p>`;
    return;
  }
  el.innerHTML = `<h3>${vehicleId} — repair timeline (systems involved: ${systems})</h3>
    <table>
      <thead><tr><th>Date</th><th>Mileage</th><th>System</th><th>Symptom</th><th>Repair</th><th>Cost</th></tr></thead>
      <tbody>
        ${rows.map(r=>`<tr>
          <td>${r.service_date}</td><td>${r.mileage.toLocaleString()}</td>
          <td>${r.system}</td><td>${r.symptom}</td><td>${r.repair_performed}</td>
          <td>$${r.cost_usd.toFixed(0)}</td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}
</script>
</body>
</html>
